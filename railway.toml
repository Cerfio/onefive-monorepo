# Railway config for service: onefive-back
# Service root directory must be "/" (repo root) — not onefive-back/

[build]
builder = "DOCKERFILE"
dockerfilePath = "onefive-back/Dockerfile"
watchPatterns = ["onefive-back/**", "package.json", "pnpm-lock.yaml", "pnpm-workspace.yaml"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
